<!doctype html>
<html>
  <head>
    <title>Game</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/default.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  </head>

  <body data-lobby-id="{{lobby_id}}" data-nickname="{{nickname}}">
    {% if lobby_id %}
    <p>Lobby: {{lobby_id}} | Player: {{nickname}}</p>
    {% endif %}

    <hr />

    <h3>Players</h3>
    <ul id="players"></ul>

    <hr />

    <h3>Question:</h3>
    <pre><code id="question" class="language-python"></code></pre>

    <p id="Timer"></p>

    <br />

    <button id="choice1"></button>
    <button id="choice2"></button>
    <button id="choice3"></button>
    <button id="choice4"></button>
  </body>

  <script src="/static/game_scripts.js"></script>
</html>
